# Plugin Management
set -g @plugin 'tmux-plugins/tpm'

# Plugins
set -g @plugin 'catppuccin/tmux'                     # Theme
set -g @plugin "christoomey/vim-tmux-navigator"      # Vim-like pane navigation
set -g @plugin 'omerxx/tmux-sessionx'                # Quick session switching
set -g @plugin 'tmux-plugins/tmux-online-status'     # Online status
set -g @plugin 'tmux-plugins/tmux-battery'           # Battery status
set -g @plugin 'tmux-plugins/tmux-cpu'               # CPU and GPU status
set -g @plugin "tmux-plugins/tmux-resurrect"         # Session resurrection
set -g @plugin "tmux-plugins/tmux-continuum"         # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-sensible'          # Sensible defaults for tmux

# Enable 256-color and true-color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Window and pane indexing start from 1
set-option -g base-index 1
set-option -g pane-base-index 1

# Prefix key configuration
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# Pane splitting with directory inheritance
unbind %
bind | split-window -h -c "#{pane_current_path}" # Horizontal split
unbind '"'
bind - split-window -v -c "#{pane_current_path}" # Vertical split

# Keybindings for copy mode
unbind v
bind v copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Reload configuration file
unbind r
bind r source-file ~/.tmux.conf

# Pane resizing shortcuts
bind -r j resize-pane -D 5  # Resize pane downward by 5 lines
bind -r k resize-pane -U 5  # Resize pane upward by 5 lines
bind -r l resize-pane -R 5  # Resize pane to the right by 5 columns
bind -r h resize-pane -L 5  # Resize pane to the left by 5 columns
bind -r m resize-pane -Z    # Toggle zoom for the active pane

# Enable mouse support
set -g mouse on

# Use Vi-style keys in copy mode
set-window-option -g mode-keys vi

# Quick session management
bind-key -r f run-shell "tmux neww tmux-sessionizer.sh" # Launch sessionizer script
bind-key n command-prompt "new-session -s '%%'"        # Create a new named session

# Session persistence settings
set -g @resurrect-capture-pane-contents "on" # Capture pane contents during resurrection
set -g @continuum-restore "on"              # Auto-restore sessions

# Catppuccin theme customization
set -g @catppuccin_flavor "mocha"                      # Use the mocha variant
set -g @catppuccin_status_background "none"            # Transparent background for status bar
set -g @catppuccin_window_status_style "none"          # Minimal styling for window status
set -g @catppuccin_pane_status_enabled "off"           # Disable additional pane indicators
set -g @catppuccin_pane_border_status "off"            # Disable pane border styling

# Status bar customization
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# Status bar - Left section
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Status bar - Right section
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_mauve}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"

# Window and pane behavior
set -wg automatic-rename on                             # Automatically rename windows
set -g automatic-rename-format "#{pane_current_command}" # Use active command for renaming
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

