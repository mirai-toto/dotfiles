# Window mode: indexed
# Main/Side/Extra show their fixed label. Extra windows beyond the 3 show index only ("_" sentinel).
# Switch to labeled mode: prefix + M-l

run 'echo indexed > #{@tmux_config_dir}/window_mode'
set -g automatic-rename-format "_"
set -g window-status-format " #I#{?#{!=:#{window_name},_},: #W,} "
set -g window-status-current-format " #I#{?#{!=:#{window_name},_},: #W,} "
