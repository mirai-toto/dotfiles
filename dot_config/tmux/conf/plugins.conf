# Plugin declarations
set -g @plugin 'tmux-plugins/tpm'                    # Plugin manager
set -g @plugin "tmux-plugins/tmux-resurrect"         # Session resurrection
set -g @plugin "tmux-plugins/tmux-continuum"         # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-sensible'          # Sensible defaults for tmux
set -g @plugin 'tmux-plugins/tmux-battery'           # Battery status
set -g @plugin 'catppuccin/tmux'                     # Theme
set -g @plugin 'alexwforsythe/tmux-which-key'        # Which-key menu for keybindings
set -g @plugin 'xamut/tmux-weather'                  # Weather in status bar
set -g @plugin 'tmux-plugins/tmux-cpu'               # CPU usage in status bar
set -g @plugin 'tmux-plugins/tmux-online-status'     # Online/offline indicator
set -g @plugin 'omerxx/tmux-sessionx'                # Session manager with fuzzy search

# Plugin configuration
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"
run 'tmux set -g @tmux-weather-location "$TMUX_WEATHER_LOCATION"'

# tmux-which-key: use XDG path outside of plugins dir so TPM updates don't overwrite config
set -g @tmux-which-key-xdg-enable 1
set -g @tmux-which-key-xdg-plugin-path tmux/which-key

# Catppuccin options (must be set before catppuccin.tmux runs)
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""

# Run catppuccin first so @thm_* variables are available for status config
run '#{@tmux_config_dir}/plugins/tmux/catppuccin.tmux'
