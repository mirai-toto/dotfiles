# Plugin configuration
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"
run 'tmux set -g @tmux-weather-location "$USER_WEATHER_LOCATION"'
set -g @tmux-weather-interval 30

# tmux-which-key: use XDG path outside of plugins dir so TPM updates don't overwrite config
set -g @tmux-which-key-xdg-enable 1
set -g @tmux-which-key-xdg-plugin-path tmux/which-key

# Catppuccin options (must be set before catppuccin.tmux runs)
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""

# Run catppuccin first so @thm_* variables are available for status config
run '#{@tmux_config_dir}/plugins/tmux/catppuccin.tmux'
