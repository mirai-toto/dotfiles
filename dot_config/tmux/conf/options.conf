# Terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Window and pane indexing
set-option -g base-index 1
set-option -g pane-base-index 1

# Mouse support
set -g mouse on

# Status refresh interval
set -g status-interval 1

# Vi-style copy mode
set-window-option -g mode-keys vi

# Shell
set-option -g default-shell "/home/linuxbrew/.linuxbrew/bin/zsh"
set-option -g default-command "/home/linuxbrew/.linuxbrew/bin/zsh -l"

# Default session windows (order defines position)
set -g @setup_windows "Main Side Extra"

# Hooks
set-hook -g after-new-session 'run-shell "~/.local/bin/tmux_setup.sh"'
