# Window modes: indexed (default) and labeled.
# Indexed: fixed labels show "index: name", unlabeled extras show index only ("_" sentinel).
# Labeled: zsh panes show current dir basename, others show process name.
# Switch via which-key: Space > w > I/L
# Mode tracked in @window_mode tmux option, persisted to window_mode file across server restarts.

# On server start @window_mode is unset — restore from persisted file
if-shell 'test -z "#{@window_mode}"' {
  if-shell 'test "$(cat #{@tmux_config_dir}/window_mode 2>/dev/null)" = labeled' {
    set -gq @window_mode labeled
  } {
    set -gq @window_mode indexed
  }
}

set -wg automatic-rename on

if -F '#{==:#{@window_mode},labeled}' {
  set -g allow-rename off
  set -g automatic-rename-format "#{?#{==:#{pane_current_command},zsh},#{b:pane_current_path},#{pane_current_command}}"
  set -g window-status-format " #I: #W "
  set -g window-status-current-format " #I: #W "
} {
  set -g window-status-format " #I "
  set -g window-status-current-format " #I "
}

# Persist current mode to file for next server start
run 'printf "%s" "#{@window_mode}" > #{@tmux_config_dir}/window_mode'

set -g window-status-style "fg=#{@thm_rosewater}"
set -g window-status-last-style "fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[fg=#{@thm_overlay_0}]│"
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
