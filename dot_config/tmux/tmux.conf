# Store config dir so keybindings can reference it without hardcoded paths
set -gF @tmux_config_dir "#{d:current_file}"

# Load plugins
source-file -F '#{d:current_file}/conf/plugins.conf'

# Load options
source-file -F '#{d:current_file}/conf/options.conf'

# Load keybindings
source-file -F '#{d:current_file}/conf/keybindings.conf'

# Load window mode (indexed by default)
source-file -F '#{d:current_file}/conf/windows.conf'

# Load status bar config
source-file -F '#{d:current_file}/conf/tmux_status.conf'

# Explicitly run plugin init scripts (TPM may not detect them in XDG config path)
run '#{@tmux_config_dir}/plugins/tmux-cpu/cpu.tmux'
run '#{@tmux_config_dir}/plugins/tmux-online-status/online_status.tmux'
run '#{@tmux_config_dir}/plugins/tmux-which-key/plugin.sh.tmux'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '#{@tmux_config_dir}/plugins/tpm/tpm'

# Auto-install plugins on first run
if "test ! -d #{@tmux_config_dir}/plugins/tmux-sensible" \
  "run '#{@tmux_config_dir}/plugins/tpm/bin/install_plugins'"
