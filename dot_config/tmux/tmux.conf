# Store config dir so keybindings can reference it without hardcoded paths
set -gF @tmux_config_dir "#{d:current_file}"

# Plugin declarations (must be in tmux.conf directly so TPM can parse them)
set -g @plugin 'tmux-plugins/tpm'                    # Plugin manager
set -g @plugin "tmux-plugins/tmux-resurrect"         # Session resurrection
set -g @plugin "tmux-plugins/tmux-continuum"         # Auto-save sessions
set -g @plugin 'tmux-plugins/tmux-sensible'          # Sensible defaults for tmux
set -g @plugin 'tmux-plugins/tmux-battery'           # Battery status
set -g @plugin 'catppuccin/tmux'                     # Theme
set -g @plugin 'alexwforsythe/tmux-which-key'        # Which-key menu for keybindings
set -g @plugin 'xamut/tmux-weather'                  # Weather in status bar
set -g @plugin 'tmux-plugins/tmux-cpu'               # CPU usage in status bar
set -g @plugin 'tmux-plugins/tmux-online-status'     # Online/offline indicator
set -g @plugin 'omerxx/tmux-sessionx'                # Session manager with fuzzy search

# Load plugin config and run catppuccin early (before status config)
source-file -F '#{d:current_file}/conf/plugins.conf'

# Load options
source-file -F '#{d:current_file}/conf/options.conf'

# Load keybindings
source-file -F '#{d:current_file}/conf/keybindings.conf'

# Load window mode (indexed by default)
source-file -F '#{d:current_file}/conf/windows.conf'

# Load status bar config
source-file -F '#{d:current_file}/conf/tmux_status.conf'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '#{@tmux_config_dir}/plugins/tpm/tpm'

# Auto-install plugins on first run
if "test ! -d #{@tmux_config_dir}/plugins/tmux-sensible" \
  "run '#{@tmux_config_dir}/plugins/tpm/bin/install_plugins'"